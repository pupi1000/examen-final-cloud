# Completa si es necesario — expone el Pod en puerto 30080 para validación
apiVersion: v1
kind: Service
metadata:
  name: mundial-web-service
  namespace: mundial
  labels:
    app: mundial-web
spec:
  type: NodePort
  selector:
    app: mundial-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
